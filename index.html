<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Central Anime | Em Breve</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">

        <style>
            :root { 
                --bg-color: #0d1117;
                --card-bg: #161b22;
                --border-color: #30363d;
                --accent-orange: #ff7a00; 
                --accent-blue: #1f6feb;
                --text-muted: #8b949e;
            }
            body { 
                background-color: var(--bg-color); 
                color: #fff; 
                font-family: 'Urbanist', sans-serif; 
                height: 100vh; 
                display: flex; 
                align-items: center; 
                justify-content: center;
                margin: 0;
                overflow: hidden;
            }
            .message-card {
                background-color: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 24px;
                padding: 3.5rem 2.5rem;
                text-align: center;
                max-width: 550px;
                width: 90%;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                position: relative;
            }
            .icon-wrapper {
                font-size: 3.5rem;
                background: linear-gradient(135deg, var(--accent-orange), #ff4d00);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 1rem;
            }
            h1 { 
                font-weight: 800; 
                margin-bottom: 1rem; 
                font-size: 2rem;
                background: linear-gradient(135deg, #fff, #c9d1d9);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            p { 
                color: var(--text-muted); 
                margin-bottom: 2.5rem; 
                line-height: 1.6; 
                font-size: 1.05rem;
            }
            .btn-main { 
                background: linear-gradient(135deg, var(--accent-orange), #ff5500);
                color: #fff; 
                border: none; 
                padding: 0.9rem 2.5rem; 
                border-radius: 50px; 
                font-weight: 700; 
                text-decoration: none;
                transition: all 0.3s ease;
                display: inline-flex;
                align-items: center;
                gap: 10px;
                box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
            }
            .btn-main:hover { 
                transform: translateY(-3px); 
                box-shadow: 0 8px 25px rgba(255, 122, 0, 0.4);
                color: #fff;
                opacity: 0.95;
            }
            .tag {
                display: inline-block;
                background-color: rgba(31, 111, 235, 0.1);
                color: var(--accent-blue);
                padding: 0.4rem 1rem;
                border-radius: 50px;
                font-size: 0.85rem;
                font-weight: 700;
                text-transform: uppercase;
                margin-bottom: 1.5rem;
                border: 1px solid rgba(31, 111, 235, 0.2);
            }
        </style>
    </head>
    <body>

        <div class="message-card">
            <span class="tag">Em Desenvolvimento</span>
            <div class="icon-wrapper">
                <i class="fa-solid fa-rocket"></i>
            </div>
            <h1>A jornada já começou!</h1>
            <p>O Central Anime está sendo desenvolvido para ser a melhor plataforma brasileira de listas e notas por episódios. Enquanto preparamos tudo por aqui, faça parte da nossa comunidade oficial!</p>
            
            <a href="https://discord.centralanime.com.br/" class="btn-main">
                <i class="fa-brands fa-discord"></i> Entrar no Discord
            </a>
        </div>

    </body>
</html>
